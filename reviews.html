<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<title>Nexus — Reviews & Suggestions</title>
<link rel="icon" href="icon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#07050d;color:#e0d8f0;overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column;align-items:center}
#bgvid{position:fixed;top:0;left:0;width:100vw;height:100vh;object-fit:cover;z-index:0;pointer-events:none;opacity:.5}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,rgba(7,5,13,.85),rgba(7,5,13,.6),rgba(7,5,13,.85));z-index:1;pointer-events:none}
.topbar{position:fixed;top:16px;right:24px;z-index:3}
.backbtn{display:inline-flex;align-items:center;gap:6px;background:#1a1030;color:#8870a8;border:1px solid #2a1f40;border-radius:4px;padding:8px 14px;font-size:12px;font-weight:600;text-decoration:none;cursor:pointer;transition:border-color .15s,color .15s;letter-spacing:.5px}
.backbtn:hover{border-color:#7c3aed;color:#c4b5fd}
.content{position:relative;z-index:2;width:100%;max-width:540px;padding:60px 24px;display:flex;flex-direction:column;align-items:center;gap:28px}
.logo{display:flex;flex-direction:column;align-items:center;gap:6px}
.logo img{width:48px;height:48px}
.logo h1{font-size:20px;font-weight:800;letter-spacing:5px;color:#c4b5fd}
h2{font-size:14px;font-weight:700;color:#c4b5fd;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
p{font-size:13px;color:#9880b8;line-height:1.7}
p a{color:#7c3aed;text-decoration:none}
p a:hover{color:#b366ff}
.section{width:100%;display:flex;flex-direction:column}
hr{width:40px;height:1px;border:none;background:#2a1f40}
.review-card{display:flex;flex-direction:column;padding:10px 12px;background:rgba(26,16,48,.5);border:1px solid #2a1f40;border-radius:3px;font-size:12px;color:#9880b8;margin-bottom:4px;transition:border-color .15s}
.review-card:hover{border-color:#3a2a60}
.review-card .title{font-size:13px;font-weight:600;color:#c4b5fd;margin-bottom:2px}
.review-card .title a{color:#c4b5fd;text-decoration:none}
.review-card .title a:hover{color:#b366ff}
.review-card .meta{font-size:11px;color:#554070;margin-bottom:2px}
.review-card .body{font-size:12px;color:#9880b8;line-height:1.6}
.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.action-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:4px;font-size:12px;font-weight:600;border:1px solid #2a1f40;background:#1a1030;color:#8870a8;cursor:pointer;transition:border-color .15s,color .15s;letter-spacing:.5px;font-family:inherit}
.action-btn:hover{border-color:#7c3aed;color:#c4b5fd}
.loading{font-size:12px;color:#554070;padding:8px 0}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;display:none;align-items:center;justify-content:center}
.modal.active{display:flex}
.modal-bg{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(7,5,13,.8)}
.modal-box{position:relative;background:#0f0a1e;border:1px solid #2a1f40;border-radius:8px;padding:24px;width:90%;max-width:460px;max-height:90vh;overflow-y:auto}
.modal-box h2{margin-bottom:16px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:11px;color:#8870a8;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.form-group input,.form-group textarea{width:100%;background:#1a1030;border:1px solid #2a1f40;border-radius:3px;padding:8px 10px;font-size:12px;color:#e0d8f0;outline:none;transition:border-color .15s;font-family:inherit}
.form-group input:focus,.form-group textarea:focus{border-color:#7c3aed}
.form-group textarea{min-height:80px;resize:vertical}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.form-actions button{padding:8px 16px;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer;letter-spacing:.5px;border:none;font-family:inherit;transition:opacity .15s}
.form-actions button:hover{opacity:.85}
.btn-primary{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff}
.btn-cancel{background:#1a1030;color:#8870a8;border:1px solid #2a1f40!important}
.stars{display:flex;gap:4px;cursor:pointer}
.stars span{font-size:22px;color:#2a1f40;transition:color .1s}
.stars span.active{color:#f59e0b}
.stars span:hover{color:#f59e0b}
.token-input{display:flex;gap:8px;align-items:center;margin-bottom:12px;width:100%}
.token-input input{flex:1;background:#1a1030;border:1px solid #2a1f40;border-radius:3px;padding:8px 10px;font-size:12px;color:#e0d8f0;outline:none;font-family:inherit}
.token-input input:focus{border-color:#7c3aed}
.token-input button{padding:8px 12px;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;white-space:nowrap;font-family:inherit;transition:opacity .15s}
.token-input button:hover{opacity:.85}
.status-msg{font-size:11px;color:#8870a8;margin-top:4px}
.status-msg.error{color:#ef4444}
.status-msg.success{color:#22c55e}
</style>
</head>
<body>
<video id="bgvid" src="bg.mp4" autoplay loop muted playsinline></video>
<div class="overlay"></div>
<div class="topbar">
  <a href="info.html" class="backbtn">info</a>
  <a href="index.html" class="backbtn">← Back</a>
</div>
<div class="content">
  <div class="logo">
    <img src="icon.png" alt="Nexus">
    <h1>REVIEWS</h1>
  </div>

  <p>Share your experience or suggest something new.</p>

  <div class="actions" id="action-buttons"></div>

  <hr>

  <h2>Recent Reviews</h2>
  <div class="reviews-list" id="reviews-list">
    <div class="loading">Loading...</div>
  </div>

  <hr>

  <div class="logo" style="gap:4px">
    <img src="icon.png" alt="Nexus" style="width:32px;height:32px">
    <h1 style="font-size:14px;letter-spacing:4px">NEXUS</h1>
  </div>
  <p style="font-size:11px;color:#554070">ValTheOneAndOnly &middot; 2026</p>
</div>

<div class="modal" id="modal">
  <div class="modal-bg" id="modal-bg"></div>
  <div class="modal-box">
    <h2 id="modal-title">Write a Review</h2>
    <div id="form-content"></div>
  </div>
</div>

<script>
let mode = 'review';

function getToken() {
  return localStorage.getItem('nexus_gh_token');
}

function setToken(t) {
  if (t) localStorage.setItem('nexus_gh_token', t);
  else localStorage.removeItem('nexus_gh_token');
}

function openForm(type) {
  mode = type;
  let token = getToken();
  let content = document.getElementById('form-content');

  if (!token) {
    content.innerHTML =
      '<p style="font-size:12px;color:#9880b8;margin-bottom:8px">You need a GitHub token to post. Create one at <a href="https://github.com/settings/tokens/new?scopes=public_repo&description=Nexus" target="_blank" style="color:#7c3aed">GitHub Tokens</a> with <strong style="color:#c4b5fd">public_repo</strong> scope.</p>' +
      '<button id="tutorial-btn" style="background:none;border:1px solid #2a1f40;border-radius:3px;padding:5px 10px;font-size:11px;color:#8870a8;cursor:pointer;font-family:inherit;margin-bottom:10px;transition:border-color .15s,color .15s" onmouseover="this.style.borderColor=\'#7c3aed\';this.style.color=\'#c4b5fd\'" onmouseout="this.style.borderColor=\'#2a1f40\';this.style.color=\'#8870a8\'">\u25b6 How to get a token</button>' +
      '<div id="tutorial-steps" style="display:none;font-size:11px;color:#9880b8;line-height:1.7;margin-bottom:10px;padding:10px;background:rgba(26,16,48,.5);border:1px solid #2a1f40;border-radius:3px">' +
      '<strong style="color:#c4b5fd">Step 1:</strong> Click the link above to open GitHub Token settings<br>' +
      '<strong style="color:#c4b5fd">Step 2:</strong> Give it a name (e.g. "Nexus")<br>' +
      '<strong style="color:#c4b5fd">Step 3:</strong> Under <em>Repository access</em>, select <strong style="color:#c4b5fd">Public Repositories</strong> (or "All repositories")<br>' +
      '<strong style="color:#c4b5fd">Step 4:</strong> Under <em>Permissions</em>, set <strong style="color:#c4b5fd">Issues</strong> to <strong style="color:#c4b5fd">Read and Write</strong><br>' +
      '<strong style="color:#c4b5fd">Step 5:</strong> Click <strong style="color:#c4b5fd">Generate token</strong> and copy the token (starts with <strong style="color:#c4b5fd">github_pat_</strong>)<br>' +
      '<strong style="color:#c4b5fd">Step 6:</strong> Paste it above and click <strong style="color:#c4b5fd">Save</strong></div>' +
      '<div class="token-input">' +
      '<input type="password" id="token-field" placeholder="github_pat_..." autocomplete="off">' +
      '<button id="token-save-btn">Save</button></div>' +
      '<div id="token-status" class="status-msg"></div>';
    document.getElementById('modal-title').textContent = 'GitHub Token';
    document.getElementById('modal').classList.add('active');
    document.getElementById('token-save-btn').addEventListener('click', saveToken);
    document.getElementById('token-field').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') saveToken();
    });
    document.getElementById('tutorial-btn').addEventListener('click', function() {
      var steps = document.getElementById('tutorial-steps');
      var btn = document.getElementById('tutorial-btn');
      if (steps.style.display === 'none') {
        steps.style.display = 'block';
        btn.textContent = '\u25bc How to get a token';
      } else {
        steps.style.display = 'none';
        btn.textContent = '\u25b6 How to get a token';
      }
    });
    return;
  }
  showForm(type);
}

function saveToken() {
  let val = document.getElementById('token-field').value.trim();
  if (!val) return;
  setToken(val);
  let st = document.getElementById('token-status');
  st.textContent = 'Token saved.';
  st.className = 'status-msg success';
  setTimeout(function() { showForm(mode); }, 600);
}

function showForm(type) {
  let content = document.getElementById('form-content');

  if (type === 'review') {
    document.getElementById('modal-title').textContent = 'Write a Review';
    content.innerHTML =
      '<div class="form-group"><label>Rating</label><div class="stars" id="star-picker">' +
      '<span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span></div></div>' +
      '<div class="form-group"><label>Your Experience</label><textarea id="field-experience" placeholder="Tell others what you think..."></textarea></div>' +
      '<div class="form-group"><label>System Specs (optional)</label><textarea id="field-specs" placeholder="e.g. Windows 11, RTX 4070, i7-13700K"></textarea></div>' +
      '<div class="form-actions"><button class="btn-cancel" id="cancel-btn">Cancel</button><button class="btn-primary" id="submit-btn">Submit Review</button></div>' +
      '<div id="submit-status" class="status-msg"></div>';
  } else {
    document.getElementById('modal-title').textContent = 'Suggest a Feature';
    content.innerHTML =
      '<div class="form-group"><label>Your Idea</label><textarea id="field-idea" placeholder="What would you like to see?"></textarea></div>' +
      '<div class="form-group"><label>Why This Helps</label><textarea id="field-why" placeholder="How does this improve Nexus?"></textarea></div>' +
      '<div class="form-actions"><button class="btn-cancel" id="cancel-btn">Cancel</button><button class="btn-primary" id="submit-btn">Submit Suggestion</button></div>' +
      '<div id="submit-status" class="status-msg"></div>';
  }

  setTimeout(function() {
    var stars = document.querySelectorAll('#star-picker span');
    for (var i = 0; i < stars.length; i++) {
      stars[i].addEventListener('click', function() {
        for (var j = 0; j < stars.length; j++) stars[j].classList.remove('active');
        var v = parseInt(this.dataset.v);
        for (var k = 0; k < v; k++) stars[k].classList.add('active');
      });
    }
    document.getElementById('submit-btn').addEventListener('click', submitForm);
    document.getElementById('cancel-btn').addEventListener('click', closeForm);
  }, 50);
  document.getElementById('modal').classList.add('active');
}

function closeForm() {
  document.getElementById('modal').classList.remove('active');
}

async function submitForm() {
  let status = document.getElementById('submit-status');
  status.className = 'status-msg';
  status.textContent = 'Submitting...';

  let token = getToken();
  if (!token) {
    status.textContent = 'Token missing. Please re-open the form.';
    status.className = 'status-msg error';
    return;
  }

  let title, body;

  if (mode === 'review') {
    let stars = document.querySelectorAll('#star-picker span.active').length;
    let experience = document.getElementById('field-experience').value.trim();
    let specs = document.getElementById('field-specs').value.trim();

    if (!stars) {
      status.textContent = 'Please select a rating.';
      status.className = 'status-msg error';
      return;
    }
    if (!experience) {
      status.textContent = 'Please describe your experience.';
      status.className = 'status-msg error';
      return;
    }

    let starStr = '\u2605'.repeat(stars) + '\u2606'.repeat(5 - stars);
    title = 'Review: ' + experience.slice(0, 60);
    body = '### Rating\n\n' + starStr + '\n\n### Your experience\n\n' + experience;
    if (specs) body += '\n\n### System specs (optional)\n\n' + specs;
  } else {
    let idea = document.getElementById('field-idea').value.trim();
    let why = document.getElementById('field-why').value.trim();

    if (!idea) {
      status.textContent = 'Please describe your idea.';
      status.className = 'status-msg error';
      return;
    }
    if (!why) {
      status.textContent = 'Please explain why this helps.';
      status.className = 'status-msg error';
      return;
    }

    title = 'Suggestion: ' + idea.slice(0, 60);
    body = '### Your idea\n\n' + idea + '\n\n### Why this helps\n\n' + why;
  }

  try {
    let res = await fetch('https://api.github.com/repos/ValTheOneAndOnly/nexus-site/issues', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Content-Type': 'application/json',
        'Accept': 'application/vnd.github.v3+json'
      },
      body: JSON.stringify({
        title: title,
        body: body,
        labels: mode === 'review' ? ['review'] : ['suggestion']
      })
    });

    if (res.status === 401) {
      setToken(null);
      status.textContent = 'Token is invalid or expired. Please re-enter.';
      status.className = 'status-msg error';
      setTimeout(function() { closeForm(); openForm(mode); }, 1500);
      return;
    }

    if (!res.ok) {
      let err = await res.text();
      status.textContent = 'Error: ' + err.slice(0, 100);
      status.className = 'status-msg error';
      return;
    }

    status.textContent = 'Submitted! Thank you.';
    status.className = 'status-msg success';
    setTimeout(function() {
      closeForm();
      loadReviews();
    }, 1200);
  } catch (e) {
    status.textContent = 'Network error: ' + e.message;
    status.className = 'status-msg error';
  }
}

async function loadReviews() {
  try {
    let res = await fetch('https://api.github.com/repos/ValTheOneAndOnly/nexus-site/issues?labels=review&per_page=20&sort=created&direction=desc');
    if (!res.ok) throw new Error('fetch failed');
    let issues = await res.json();
    let container = document.getElementById('reviews-list');
    container.innerHTML = '';
    if (issues.length === 0) {
      container.innerHTML = '<p style="font-size:12px;color:#554070;padding:8px 0">No reviews yet. Be the first!</p>';
      return;
    }
    for (let issue of issues) {
      if (issue.pull_request) continue;
      let card = document.createElement('div');
      card.className = 'review-card';
      let fields = parseReviewBody(issue.body || '');
      let date = new Date(issue.created_at).toLocaleDateString('en-US', {year:'numeric',month:'short',day:'numeric'});
      let extra = '';
      if (fields.rating) extra += '<div style="font-size:16px;margin:2px 0 2px 0">' + escapeHtml(fields.rating) + '</div>';
      if (fields.experience) extra += '<div class="body">' + escapeHtml(fields.experience) + '</div>';
      card.innerHTML =
        '<div class="title"><a href="' + issue.html_url + '" target="_blank">' + escapeHtml(issue.title) + '</a></div>' +
        '<div class="meta">by ' + escapeHtml(issue.user.login) + ' \u00b7 ' + date + (issue.state === 'closed' ? ' \u00b7 resolved' : '') + '</div>' +
        extra;
      container.appendChild(card);
    }
  } catch (e) {
    document.getElementById('reviews-list').innerHTML = '<p style="font-size:12px;color:#554070;padding:8px 0">Could not load reviews. <a href="https://github.com/ValTheOneAndOnly/nexus-site/issues">View on GitHub \u2192</a></p>';
  }
}

function parseReviewBody(body) {
  let result = { rating: '', experience: '', specs: '', idea: '', reason: '' };
  if (!body) return result;
  let lines = body.split('\n').map(function(l) { return l.trim(); }).filter(function(l) { return l; });
  let current = '';
  for (let line of lines) {
    if (line.startsWith('### ')) {
      current = line.replace('### ', '').replace(' (optional)', '').toLowerCase();
      continue;
    }
    if (line === '_No response_' || line === '---') continue;
    if (current.indexOf('rating') !== -1) result.rating = line;
    else if (current.indexOf('your experience') !== -1) result.experience = (result.experience + ' ' + line).trim();
    else if (current.indexOf('system specs') !== -1) result.specs = (result.specs + ' ' + line).trim();
    else if (current.indexOf('your idea') !== -1) result.idea = (result.idea + ' ' + line).trim();
    else if (current.indexOf('why this helps') !== -1) result.reason = (result.reason + ' ' + line).trim();
  }
  return result;
}

function escapeHtml(s) {
  let d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

document.addEventListener('DOMContentLoaded', function() {
  var actions = document.getElementById('action-buttons');
  var reviewBtn = document.createElement('button');
  reviewBtn.className = 'action-btn';
  reviewBtn.textContent = '\u2605 Write a Review';
  reviewBtn.addEventListener('click', function() { openForm('review'); });
  actions.appendChild(reviewBtn);

  var suggestBtn = document.createElement('button');
  suggestBtn.className = 'action-btn';
  suggestBtn.textContent = 'Suggest or Report';
  suggestBtn.addEventListener('click', function() { openForm('suggestion'); });
  actions.appendChild(suggestBtn);

  document.getElementById('modal-bg').addEventListener('click', closeForm);

  loadReviews();
});
</script>
</body>
</html>
