<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus — Reviews</title>
<link rel="icon" href="icon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#07050d;color:#e0d8f0;overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column;align-items:center}
#bgvid{position:fixed;top:0;left:0;width:100vw;height:100vh;object-fit:cover;z-index:0;pointer-events:none;opacity:.5}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,rgba(7,5,13,.85),rgba(7,5,13,.6),rgba(7,5,13,.85));z-index:1;pointer-events:none}
.topbar{position:fixed;top:16px;right:24px;z-index:3;display:flex;gap:8px}
.topbtn{display:inline-flex;align-items:center;gap:6px;background:#1a1030;color:#8870a8;border:1px solid #2a1f40;border-radius:4px;padding:8px 14px;font-size:12px;font-weight:600;text-decoration:none;cursor:pointer;transition:border-color .15s,color .15s;letter-spacing:.5px}
.topbtn:hover{border-color:#7c3aed;color:#c4b5fd}
.content{position:relative;z-index:2;width:100%;max-width:620px;padding:60px 24px;display:flex;flex-direction:column;align-items:center;gap:28px}
.logo{display:flex;flex-direction:column;align-items:center;gap:6px}
.logo img{width:48px;height:48px}
.logo h1{font-size:20px;font-weight:800;letter-spacing:5px;color:#c4b5fd}
h2{font-size:14px;font-weight:700;color:#c4b5fd;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;text-align:center}
p{font-size:13px;color:#9880b8;line-height:1.7;text-align:center}
hr{width:40px;height:1px;border:none;background:#2a1f40}
.actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.action-btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:6px;font-size:13px;font-weight:700;text-decoration:none;border:none;cursor:pointer;transition:opacity .15s;letter-spacing:.5px}
.action-btn:hover{opacity:.8}
.action-btn.review{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff}
.action-btn.suggest{background:#1a1030;color:#c4b5fd;border:1px solid #2a1f40}
.reviews-list{width:100%;display:flex;flex-direction:column;gap:8px}
.review-card{background:rgba(26,16,48,.5);border:1px solid #2a1f40;border-radius:6px;padding:14px 16px;text-align:left}
.review-card .title{font-size:13px;font-weight:600;color:#c4b5fd;margin-bottom:4px}
.review-card .title a{color:#c4b5fd;text-decoration:none}
.review-card .title a:hover{color:#b366ff}
.review-card .meta{font-size:11px;color:#554070}
.review-card .body{font-size:12px;color:#9880b8;margin-top:6px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.loading{font-size:12px;color:#554070}
</style>
</head>
<body>
<video id="bgvid" src="bg.mp4" autoplay loop muted playsinline></video>
<div class="overlay"></div>
<div class="topbar">
  <a href="index.html" class="topbtn">← Home</a>
  <a href="info.html" class="topbtn">info</a>
</div>
<div class="content">
  <div class="logo">
    <img src="icon.png" alt="Nexus">
    <h1>REVIEWS</h1>
  </div>

  <p>Share your experience or suggest something new. All feedback goes to GitHub Issues.</p>

  <div class="actions">
    <a href="https://github.com/ValTheOneAndOnly/nexus-site/issues/new?template=review.yml&title=Review:" class="action-btn review">★ Write a Review</a>
    <a href="https://github.com/ValTheOneAndOnly/nexus-site/issues/new?template=suggestion.yml&title=Suggestion:" class="action-btn suggest">Suggest a Feature</a>
  </div>

  <hr>

  <h2>Recent Reviews</h2>
  <div class="reviews-list" id="reviews-list">
    <div class="loading">Loading...</div>
  </div>

  <hr>

  <p style="font-size:11px;color:#554070">ValTheOneAndOnly · 2026</p>
</div>

<script>
async function loadReviews() {
  try {
    let res = await fetch('https://api.github.com/repos/ValTheOneAndOnly/nexus-site/issues?state=all&per_page=20&sort=created&direction=desc');
    if (!res.ok) throw new Error('fetch failed');
    let issues = await res.json();
    let container = document.getElementById('reviews-list');
    container.innerHTML = '';
    if (issues.length === 0) {
      container.innerHTML = '<p style="font-size:12px;color:#554070">No reviews yet. Be the first!</p>';
      return;
    }
    for (let issue of issues) {
      let card = document.createElement('div');
      card.className = 'review-card';
      let fields = parseReviewBody(issue.body || '');
      let date = new Date(issue.created_at).toLocaleDateString('en-US', {year:'numeric',month:'short',day:'numeric'});
      let extra = '';
      if (fields.rating) extra += `<div style="font-size:15px;margin-bottom:4px">${escapeHtml(fields.rating)}</div>`;
      if (fields.experience) extra += `<div class="body">${escapeHtml(fields.experience)}</div>`;
      if (fields.specs) extra += `<div class="meta" style="margin-top:4px">${escapeHtml(fields.specs)}</div>`;
      card.innerHTML = `
        <div class="title"><a href="${issue.html_url}" target="_blank">${escapeHtml(issue.title)}</a></div>
        <div class="meta">by ${escapeHtml(issue.user.login)} · ${date} ${issue.state === 'closed' ? '· resolved' : ''}</div>
        ${extra}
      `;
      container.appendChild(card);
    }
  } catch (e) {
    document.getElementById('reviews-list').innerHTML = '<p style="font-size:12px;color:#554070">Could not load reviews. <a href="https://github.com/ValTheOneAndOnly/nexus-site/issues" style="color:#7c3aed;text-decoration:none">View on GitHub →</a></p>';
  }
}
function parseReviewBody(body) {
  // Parse YAML-template markdown body into clean fields
  let result = { rating: '', experience: '', specs: '', idea: '', reason: '' };
  if (!body) return result;
  let lines = body.split('\n').map(l => l.trim()).filter(l => l);
  let current = '';
  for (let line of lines) {
    if (line.startsWith('### ')) {
      current = line.replace('### ', '').replace(' (optional)', '').toLowerCase();
      continue;
    }
    if (line === '_No response_' || line === '---') continue;
    if (current.includes('rating')) result.rating = line;
    else if (current.includes('your experience')) result.experience = (result.experience + ' ' + line).trim();
    else if (current.includes('system specs')) result.specs = (result.specs + ' ' + line).trim();
    else if (current.includes('your idea')) result.idea = (result.idea + ' ' + line).trim();
    else if (current.includes('why this helps')) result.reason = (result.reason + ' ' + line).trim();
  }
  return result;
}
function escapeHtml(s) {
  let d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
loadReviews();
</script>
</body>
</html>
