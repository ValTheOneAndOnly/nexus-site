<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus</title>
<link rel="icon" href="icon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#07050d;color:#e0d8f0;overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column;align-items:center}
#bgvid{position:fixed;top:0;left:0;width:100vw;height:100vh;object-fit:cover;z-index:0;pointer-events:none;opacity:.5}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,rgba(7,5,13,.85),rgba(7,5,13,.6),rgba(7,5,13,.85));z-index:1;pointer-events:none}
.topbar{position:fixed;top:16px;right:24px;z-index:3}
.infobtn{display:inline-flex;align-items:center;gap:6px;background:#1a1030;color:#8870a8;border:1px solid #2a1f40;border-radius:4px;padding:8px 14px;font-size:12px;font-weight:600;text-decoration:none;cursor:pointer;transition:border-color .15s,color .15s;letter-spacing:.5px}
.infobtn:hover{border-color:#7c3aed;color:#c4b5fd}
.content{position:relative;z-index:2;width:100%;max-width:520px;padding:80px 24px;display:flex;flex-direction:column;align-items:center;gap:36px}
.logo{display:flex;flex-direction:column;align-items:center;gap:8px}
.logo img{width:64px;height:64px}
.logo h1{font-size:28px;font-weight:800;letter-spacing:8px;color:#c4b5fd}
.download{display:flex;flex-direction:column;align-items:center;gap:12px}
.btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;padding:12px 32px;border-radius:6px;font-size:14px;font-weight:700;text-decoration:none;transition:opacity .15s;border:none;cursor:pointer;letter-spacing:.5px}
.btn:hover{opacity:.85}
.btn svg{width:18px;height:18px}
.meta{display:flex;gap:16px;font-size:11px;color:#554070}
.meta span{display:flex;align-items:center;gap:4px}
hr{width:40px;height:1px;border:none;background:#2a1f40}
.footer{font-size:12px;color:#554070;text-align:center}
.footer a{color:#7c3aed;text-decoration:none}
.footer a:hover{color:#c4b5fd}
</style>
</head>
<body>
<video id="bgvid" src="bg.mp4" autoplay loop muted playsinline></video>
<div class="overlay"></div>
<div class="topbar">
  <a href="info.html" class="infobtn">info</a>
  <a href="reviews.html" class="infobtn">reviews</a>
</div>
<div class="content">
  <div class="logo">
    <img src="icon.png" alt="Nexus">
    <h1>NEXUS</h1>
  </div>
  <div class="download">
      <a href="https://github.com/ValTheOneAndOnly/nexus-site/releases/download/v1.1/Nexus.exe" class="btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14m-7-7l7 7 7-7"/></svg>
        Download v1.1
      </a>
    <div class="meta">
      <span>144 MB</span>
      <span>Single-file</span>
      <span>Portable</span>
    </div>
  </div>
  <hr>
  <div class="footer">
    <p>ValTheOneAndOnly &middot; 2026</p>
  </div>
</div>
</body>
</html>
